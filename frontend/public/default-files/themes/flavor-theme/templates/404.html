{% extends "base.html" %}
{% block title %}404 | {{ config.siteName }}{% endblock %}
{% block content %}
<div class="container">
  <div class="error-page">
    <div class="error-page__code" aria-hidden="true">404</div>
    <h1 class="error-page__title">页面未找到</h1>
    <p class="error-page__desc">你访问的页面不存在或已被移除。</p>
    <div class="error-page__actions">
      <a href="/" class="btn btn--secondary error-page__btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <line x1="19" y1="12" x2="5" y2="12"></line>
          <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        返回首页
      </a>
    </div>
  </div>
</div>
{% endblock %}
