{# 主题色初始化：优先用本地存储，否则使用站长在主题外观里选择的默认主题，避免深浅模式闪屏 #}
<script>
  (function () {
    try {
      var saved = localStorage.getItem('flavor-theme');
      var theme = saved || '{{ theme_config.defaultTheme|default:"dark" }}';
      if (theme === 'light') {
        document.documentElement.classList.add('theme-light');
      }
    } catch (e) { }
  })();
</script>
