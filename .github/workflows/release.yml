# =============================================================================
# Gridea Pro — Cross-Platform Release Build
# =============================================================================
# 触发方式：
#   1. 推送 v 开头的 tag → 构建 + 创建 GitHub Release（草稿）
#   2. 手动触发（workflow_dispatch）→ 仅测试构建，不创建 Release
#
# 构建产物（统一命名：Gridea.Pro_{version}_{os}_{arch}.{ext}）：
#   macOS   → Gridea.Pro_v1.0.0_macos_universal.dmg
#   Windows → Gridea.Pro_v1.0.0_windows_amd64.exe
#             Gridea.Pro_v1.0.0_windows_arm64.exe
#   Linux   → Gridea.Pro_v1.0.0_linux_amd64.deb
#             Gridea.Pro_v1.0.0_linux_amd64.rpm
#             Gridea.Pro_v1.0.0_linux_amd64.AppImage
#
# 发版用法：
#   git tag -a v1.0.0 -m "Gridea Pro v1.0.0 — 发布说明"
#   git push origin v1.0.0
# =============================================================================

name: Release
run-name: ${{ github.ref_type == 'tag' && format('Release {0}', github.ref_name) || 'Build Test (manual)' }}

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  NODE_OPTIONS: "--max-old-space-size=4096"
  APP_NAME: "Gridea Pro"
  # Wails 生成的二进制文件名（含空格，与 wails.json 里的 name 一致）
  BIN_NAME: "Gridea Pro"
  # 文件系统友好名称（用于 Linux 路径、包名等）
  BIN_SLUG: "gridea-pro"
  # Release 文件名前缀
  RELEASE_PREFIX: "Gridea.Pro"

permissions:
  contents: write

jobs:
  # ===========================================================================
  # 统一提取版本号
  # ===========================================================================
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
    steps:
      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=v0.0.0-dev" >> $GITHUB_OUTPUT
          fi

  # ===========================================================================
  # macOS — Universal Binary (Intel + Apple Silicon)
  # ===========================================================================
  build-macos:
    needs: prepare
    runs-on: macos-latest
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Free disk space
        run: |
          echo "=== Before cleanup ==="
          df -h /
          # Xcode 是最大头（~10GB+）
          sudo rm -rf /Applications/Xcode*.app
          sudo rm -rf /Users/runner/Library/Android 2>/dev/null || true
          sudo rm -rf /usr/local/share/dotnet 2>/dev/null || true
          sudo rm -rf /usr/local/share/powershell 2>/dev/null || true
          sudo rm -rf /usr/local/lib/node_modules 2>/dev/null || true
          brew cleanup -s 2>/dev/null || true
          echo "=== After cleanup ==="
          df -h /

      - uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build macOS Universal App
        run: wails build -platform darwin/universal -clean -trimpath

      - name: Clean build cache before DMG
        run: |
          go clean -cache
          npm cache clean --force 2>/dev/null || true
          rm -rf ~/.cache/go-build 2>/dev/null || true
          rm -rf frontend/node_modules 2>/dev/null || true
          echo "=== Disk space before DMG ==="
          df -h /

      - name: List build output
        run: ls -la build/bin/

      - name: Create DMG
        run: |
          cd build/bin
          hdiutil create -volname "${{ env.APP_NAME }}" \
            -srcfolder "${{ env.BIN_NAME }}.app" \
            -ov -format UDZO \
            "${{ env.RELEASE_PREFIX }}_${VERSION}_macos_universal.dmg"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: build/bin/*.dmg
          if-no-files-found: error

  # ===========================================================================
  # Windows — amd64 + arm64 便携版 exe
  # ===========================================================================
  build-windows:
    needs: prepare
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build Windows ${{ matrix.arch }}
        run: wails build -platform windows/${{ matrix.arch }} -clean -trimpath

      - name: List build output
        shell: bash
        run: ls -la build/bin/

      - name: Rename artifact
        shell: pwsh
        run: |
          $exe = Get-ChildItem "build\bin\${{ env.BIN_NAME }}.exe" -ErrorAction SilentlyContinue
          if ($exe) {
            $newName = "${{ env.RELEASE_PREFIX }}_${{ env.VERSION }}_windows_${{ matrix.arch }}.exe"
            Move-Item $exe.FullName "build\bin\$newName"
          }

      - uses: actions/upload-artifact@v4
        with:
          name: windows-build-${{ matrix.arch }}
          path: build/bin/*.exe
          if-no-files-found: error

  # ===========================================================================
  # Linux — .deb + .rpm + .AppImage (amd64)
  # ===========================================================================
  build-linux:
    needs: prepare
    runs-on: ubuntu-22.04
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.0-dev \
            build-essential \
            pkg-config \
            libfuse2 \
            rpm

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install nfpm
        run: go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest

      - name: Build Linux binary
        run: wails build -platform linux/amd64 -clean -trimpath

      - name: List build output
        run: ls -la build/bin/

      # ----- .deb + .rpm（使用 nfpm 统一构建）-----
      - name: Prepare packaging files
        run: |
          SLUG="${{ env.BIN_SLUG }}"
          DEB_VERSION="${VERSION#v}"

          # .desktop 文件
          cat > ${SLUG}.desktop << EOF
          [Desktop Entry]
          Name=${{ env.APP_NAME }}
          Comment=A modern static blog client
          Exec=${SLUG}
          Icon=${SLUG}
          Type=Application
          Categories=Development;TextEditor;
          Keywords=blog;markdown;static;
          EOF

          # nfpm 配置（同时用于 .deb 和 .rpm）
          cat > nfpm.yaml << NFPM
          name: "${SLUG}"
          arch: "amd64"
          platform: "linux"
          version: "${DEB_VERSION}"
          maintainer: "Gridea Pro Contributors <hello@gridea.pro>"
          description: "A cross-platform desktop static blog client with built-in editor, theme system, and one-click deployment."
          homepage: "https://gridea.pro"
          license: "GPL-3.0"
          depends:
            - libwebkit2gtk-4.0-37
            - libgtk-3-0
          contents:
            - src: "build/bin/${{ env.BIN_NAME }}"
              dst: "/usr/bin/${SLUG}"
              file_info:
                mode: 0755
            - src: "build/appicon.png"
              dst: "/usr/share/icons/hicolor/256x256/apps/${SLUG}.png"
            - src: "${SLUG}.desktop"
              dst: "/usr/share/applications/${SLUG}.desktop"
          NFPM

      - name: Build .deb package
        run: |
          nfpm pkg -p deb -f nfpm.yaml \
            -t "build/bin/${{ env.RELEASE_PREFIX }}_${VERSION}_linux_amd64.deb"

      - name: Build .rpm package
        run: |
          nfpm pkg -p rpm -f nfpm.yaml \
            -t "build/bin/${{ env.RELEASE_PREFIX }}_${VERSION}_linux_amd64.rpm"

      # ----- AppImage -----
      - name: Build AppImage
        run: |
          SLUG="${{ env.BIN_SLUG }}"

          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps

          cp "build/bin/${{ env.BIN_NAME }}" "AppDir/usr/bin/${SLUG}"
          chmod 755 "AppDir/usr/bin/${SLUG}"
          cp build/appicon.png "AppDir/${SLUG}.png"
          cp build/appicon.png "AppDir/usr/share/icons/hicolor/256x256/apps/${SLUG}.png"
          cp "${{ env.BIN_SLUG }}.desktop" "AppDir/${SLUG}.desktop"
          cp "${{ env.BIN_SLUG }}.desktop" AppDir/usr/share/applications/

          cat > AppDir/AppRun << EOF
          #!/bin/bash
          SELF=\$(readlink -f "\$0")
          HERE=\${SELF%/*}
          export PATH="\${HERE}/usr/bin:\${PATH}"
          exec "\${HERE}/usr/bin/${SLUG}" "\$@"
          EOF
          chmod +x AppDir/AppRun

          wget -q "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x appimagetool-x86_64.AppImage

          ARCH=x86_64 ./appimagetool-x86_64.AppImage AppDir \
            "build/bin/${{ env.RELEASE_PREFIX }}_${VERSION}_linux_amd64.AppImage"

      - uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: |
            build/bin/*.deb
            build/bin/*.rpm
            build/bin/*.AppImage
          if-no-files-found: error

  # ===========================================================================
  # 创建 GitHub Release — 仅 tag 触发时执行
  # ===========================================================================
  create-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [prepare, build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: List release files
        run: |
          echo "=== Release artifacts ==="
          ls -lh artifacts/
          echo "========================="

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Gridea Pro ${{ needs.prepare.outputs.version }}
          files: artifacts/*
          generate_release_notes: true
          draft: true
          prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'alpha') || contains(github.ref, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
