# =============================================================================
# Gridea Pro — Cross-Platform Release Build
# =============================================================================
# 触发方式：
#   1. 推送 v 开头的 tag → 构建 + 创建 GitHub Release
#   2. 手动触发（workflow_dispatch）→ 仅测试构建，不创建 Release
#
# 构建产物：
#   macOS   → .dmg (Universal: Intel + Apple Silicon)
#   Windows → NSIS 安装包 (.exe installer)
#   Linux   → .deb 包 + .AppImage
#
# 发版用法：
#   git tag -a v1.0.0 -m "Gridea Pro v1.0.0 — 发布说明"
#   git push origin v1.0.0
# =============================================================================

name: Release
run-name: ${{ github.ref_type == 'tag' && format('Release {0}', github.ref_name) || 'Build Test (manual)' }}

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  NODE_OPTIONS: "--max-old-space-size=4096"
  APP_NAME: "Gridea Pro"
  BIN_NAME: "Gridea Pro"
  BIN_SLUG: "gridea-pro"

permissions:
  contents: write

jobs:
  # ===========================================================================
  # 统一提取版本号，供所有 job 使用
  # ===========================================================================
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
      is_release: ${{ steps.version.outputs.IS_RELEASE }}
    steps:
      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
            echo "IS_RELEASE=true" >> $GITHUB_OUTPUT
          else
            echo "VERSION=v0.0.0-dev" >> $GITHUB_OUTPUT
            echo "IS_RELEASE=false" >> $GITHUB_OUTPUT
          fi

  # ===========================================================================
  # macOS Build — Universal Binary (amd64 + arm64)
  # ===========================================================================
  build-macos:
    needs: prepare
    runs-on: macos-latest
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Free disk space
        run: |
          echo "=== Before cleanup ==="
          df -h /
          sudo rm -rf /Users/runner/Library/Android 2>/dev/null || true
          sudo rm -rf /Applications/Xcode_*.app 2>/dev/null || true
          sudo rm -rf /usr/local/share/powershell 2>/dev/null || true
          sudo rm -rf /usr/local/lib/node_modules 2>/dev/null || true
          echo "=== After cleanup ==="
          df -h /

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build macOS Universal App
        run: wails build -platform darwin/universal -clean -trimpath

      - name: List build output
        run: |
          echo "=== build/bin contents ==="
          ls -la build/bin/
          echo "=========================="

      - name: Create DMG
        run: |
          cd build/bin
          hdiutil create -volname "${{ env.APP_NAME }}" \
            -srcfolder "${{ env.BIN_NAME }}.app" \
            -ov -format UDZO \
            "${{ env.BIN_SLUG }}_macos_universal_${VERSION}.dmg"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: build/bin/*.dmg
          if-no-files-found: error

  # ===========================================================================
  # Windows Build — NSIS Installer
  # ===========================================================================
  build-windows:
    needs: prepare
    runs-on: windows-latest
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install NSIS
        run: choco install nsis -y

      - name: Build Windows with NSIS
        run: wails build -platform windows/amd64 -nsis -clean -trimpath

      - name: List build output
        shell: bash
        run: |
          echo "=== build/bin contents ==="
          ls -la build/bin/
          echo "=========================="

      - name: Rename artifacts
        shell: pwsh
        run: |
          $version = "${{ env.VERSION }}"
          $binDir = "build/bin"
          $slug = "${{ env.BIN_SLUG }}"

          # 重命名 NSIS 安装包
          $installer = Get-ChildItem "$binDir/*installer*" -ErrorAction SilentlyContinue
          if ($installer) {
            $newName = "${slug}_windows_amd64_${version}_setup.exe"
            Move-Item $installer.FullName "$binDir\$newName"
          }

          # 重命名原始 exe
          $exe = Get-ChildItem "$binDir\${{ env.BIN_NAME }}.exe" -ErrorAction SilentlyContinue
          if ($exe) {
            $newName = "${slug}_windows_amd64_${version}.exe"
            Move-Item $exe.FullName "$binDir\$newName"
          }

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: build/bin/*.exe
          if-no-files-found: error

  # ===========================================================================
  # Linux Build — .deb + AppImage
  # ===========================================================================
  build-linux:
    needs: prepare
    runs-on: ubuntu-22.04
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.0-dev \
            build-essential \
            pkg-config \
            libfuse2

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build Linux binary
        run: wails build -platform linux/amd64 -clean -trimpath

      - name: List build output
        run: |
          echo "=== build/bin contents ==="
          ls -la build/bin/
          echo "=========================="

      # ----- .deb 包 -----
      - name: Build .deb package
        run: |
          DEB_VERSION="${VERSION#v}"
          SLUG="${{ env.BIN_SLUG }}"
          PKG_DIR="deb-pkg"

          mkdir -p ${PKG_DIR}/DEBIAN
          mkdir -p ${PKG_DIR}/usr/bin
          mkdir -p ${PKG_DIR}/usr/share/applications
          mkdir -p ${PKG_DIR}/usr/share/icons/hicolor/256x256/apps

          cp "build/bin/${{ env.BIN_NAME }}" "${PKG_DIR}/usr/bin/${SLUG}"
          chmod 755 "${PKG_DIR}/usr/bin/${SLUG}"
          cp build/appicon.png "${PKG_DIR}/usr/share/icons/hicolor/256x256/apps/${SLUG}.png"

          cat > ${PKG_DIR}/DEBIAN/control << EOF
          Package: ${SLUG}
          Version: ${DEB_VERSION}
          Section: editors
          Priority: optional
          Architecture: amd64
          Depends: libwebkit2gtk-4.0-37, libgtk-3-0
          Maintainer: Gridea Pro Contributors <hello@gridea.pro>
          Homepage: https://gridea.pro
          Description: ${{ env.APP_NAME }} - A modern static blog client
           A cross-platform desktop static blog client with built-in editor,
           theme system, and one-click deployment. The spiritual successor
           to Gridea, rebuilt from the ground up.
          EOF

          cat > ${PKG_DIR}/usr/share/applications/${SLUG}.desktop << EOF
          [Desktop Entry]
          Name=${{ env.APP_NAME }}
          Comment=A modern static blog client
          Exec=${SLUG}
          Icon=${SLUG}
          Type=Application
          Categories=Development;TextEditor;
          Keywords=blog;markdown;static;
          EOF

          dpkg-deb --build ${PKG_DIR} \
            "build/bin/${SLUG}_linux_amd64_${VERSION}.deb"

      # ----- AppImage -----
      - name: Build AppImage
        run: |
          SLUG="${{ env.BIN_SLUG }}"

          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps

          cp "build/bin/${{ env.BIN_NAME }}" "AppDir/usr/bin/${SLUG}"
          chmod 755 "AppDir/usr/bin/${SLUG}"
          cp build/appicon.png "AppDir/${SLUG}.png"
          cp build/appicon.png "AppDir/usr/share/icons/hicolor/256x256/apps/${SLUG}.png"

          cat > "AppDir/${SLUG}.desktop" << EOF
          [Desktop Entry]
          Name=${{ env.APP_NAME }}
          Comment=A modern static blog client
          Exec=${SLUG}
          Icon=${SLUG}
          Type=Application
          Categories=Development;TextEditor;
          EOF
          cp "AppDir/${SLUG}.desktop" AppDir/usr/share/applications/

          cat > AppDir/AppRun << EOF
          #!/bin/bash
          SELF=\$(readlink -f "\$0")
          HERE=\${SELF%/*}
          export PATH="\${HERE}/usr/bin:\${PATH}"
          exec "\${HERE}/usr/bin/${SLUG}" "\$@"
          EOF
          chmod +x AppDir/AppRun

          wget -q "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x appimagetool-x86_64.AppImage

          ARCH=x86_64 ./appimagetool-x86_64.AppImage AppDir \
            "build/bin/${SLUG}_linux_amd64_${VERSION}.AppImage"

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: |
            build/bin/*.deb
            build/bin/*.AppImage
          if-no-files-found: error

  # ===========================================================================
  # 创建 GitHub Release — 仅 tag 触发时执行
  # ===========================================================================
  create-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [prepare, build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: List release files
        run: |
          echo "=== Release artifacts ==="
          ls -lh artifacts/
          echo "========================="

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Gridea Pro ${{ needs.prepare.outputs.version }}
          files: artifacts/*
          generate_release_notes: true
          draft: true
          prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'alpha') || contains(github.ref, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
