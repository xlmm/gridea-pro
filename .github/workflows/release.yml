# =============================================================================
# Gridea Pro — Cross-Platform Release Build
# =============================================================================
# 触发方式：
#   1. 推送 v 开头的 tag → 构建 + 创建 GitHub Release（草稿）
#   2. 手动触发（workflow_dispatch）→ 仅测试构建，不创建 Release
#
# 构建产物（统一命名：Gridea.Pro_{version}_{os}_{arch}.{ext}）：
#   macOS   → Gridea.Pro_v1.0.0_macos_arm64.dmg   (首次安装，Apple Silicon)
#             Gridea.Pro_v1.0.0_macos_arm64.zip   (自动更新，Apple Silicon)
#             Gridea.Pro_v1.0.0_macos_amd64.dmg   (首次安装，Intel)
#             Gridea.Pro_v1.0.0_macos_amd64.zip   (自动更新，Intel)
#   Windows → Gridea.Pro_v1.0.0_windows_amd64_setup.exe    (首次安装，Inno 安装器)
#             Gridea.Pro_v1.0.0_windows_amd64_portable.exe (自动更新，便携版)
#             Gridea.Pro_v1.0.0_windows_arm64_setup.exe    (首次安装)
#             Gridea.Pro_v1.0.0_windows_arm64_portable.exe (自动更新)
#   Linux   → Gridea.Pro_v1.0.0_linux_amd64.deb    (Ubuntu 24.04+, webkit2gtk-4.1)
#             Gridea.Pro_v1.0.0_linux_amd64.rpm    (Fedora 39+, webkit2gtk-4.1)
#             Gridea.Pro_v1.0.0_linux_amd64.AppImage (首次安装 + 自动更新)
#
# 发版用法：
#   git tag -a v1.0.0 -m "Gridea Pro v1.0.0 — 发布说明"
#   git push origin v1.0.0
# =============================================================================

name: Release
run-name: ${{ github.ref_type == 'tag' && format('Release {0}', github.ref_name) || 'Build Test (manual)' }}

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  NODE_OPTIONS: "--max-old-space-size=4096"
  APP_NAME: "Gridea Pro"
  # Wails 生成的二进制文件名（含空格，与 wails.json 里的 name 一致）
  BIN_NAME: "Gridea Pro"
  # 文件系统友好名称（用于 Linux 路径、包名等）
  BIN_SLUG: "gridea-pro"
  # Release 文件名前缀
  RELEASE_PREFIX: "Gridea.Pro"

permissions:
  contents: write

jobs:
  # ===========================================================================
  # 统一提取版本号
  # ===========================================================================
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
    steps:
      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=v0.0.0-dev" >> $GITHUB_OUTPUT
          fi

  # ===========================================================================
  # macOS — arm64 (Apple Silicon) + amd64 (Intel)
  # ===========================================================================
  build-macos:
    needs: prepare
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - arch: arm64
            platform: darwin/arm64
          - arch: amd64
            platform: darwin/amd64
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
      GH_OAUTH_CLIENT_ID: ${{ secrets.GH_OAUTH_CLIENT_ID }}
      GH_OAUTH_CLIENT_SECRET: ${{ secrets.GH_OAUTH_CLIENT_SECRET }}
      GITEE_CLIENT_ID: ${{ secrets.GITEE_CLIENT_ID }}
      GITEE_CLIENT_SECRET: ${{ secrets.GITEE_CLIENT_SECRET }}
      NETLIFY_CLIENT_ID: ${{ secrets.NETLIFY_CLIENT_ID }}
      NETLIFY_CLIENT_SECRET: ${{ secrets.NETLIFY_CLIENT_SECRET }}
      VERCEL_CLIENT_ID: ${{ secrets.VERCEL_CLIENT_ID }}
      VERCEL_CLIENT_SECRET: ${{ secrets.VERCEL_CLIENT_SECRET }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Patch wails.json productVersion
        shell: bash
        run: |
          # 把 git tag (去掉前导 v) 写入 wails.json，Wails build 会把它烤进
          # macOS Info.plist 的 CFBundleShortVersionString / Windows 资源版本。
          # 这是 Wails 框架强制的真源——没有 ldflags 通道。
          VER="${VERSION#v}"
          node -e "
            const fs = require('fs');
            const j = JSON.parse(fs.readFileSync('wails.json', 'utf8'));
            j.info.productVersion = '$VER';
            fs.writeFileSync('wails.json', JSON.stringify(j, null, 4) + '\n');
            console.log('✔ wails.json productVersion → $VER');
          "

      - name: Build macOS ${{ matrix.arch }}
        shell: bash
        run: |
          LDFLAGS="-X main.Version=${VERSION}"
          LDFLAGS="${LDFLAGS} -X gridea-pro/backend/internal/service/oauth.githubClientID=${GH_OAUTH_CLIENT_ID}"
          LDFLAGS="${LDFLAGS} -X gridea-pro/backend/internal/service/oauth.githubClientSecret=${GH_OAUTH_CLIENT_SECRET}"
          LDFLAGS="${LDFLAGS} -X gridea-pro/backend/internal/service/oauth.giteeClientID=${GITEE_CLIENT_ID}"
          LDFLAGS="${LDFLAGS} -X gridea-pro/backend/internal/service/oauth.giteeClientSecret=${GITEE_CLIENT_SECRET}"
          LDFLAGS="${LDFLAGS} -X gridea-pro/backend/internal/service/oauth.netlifyClientID=${NETLIFY_CLIENT_ID}"
          LDFLAGS="${LDFLAGS} -X gridea-pro/backend/internal/service/oauth.netlifyClientSecret=${NETLIFY_CLIENT_SECRET}"
          LDFLAGS="${LDFLAGS} -X gridea-pro/backend/internal/service/oauth.vercelClientID=${VERCEL_CLIENT_ID}"
          LDFLAGS="${LDFLAGS} -X gridea-pro/backend/internal/service/oauth.vercelClientSecret=${VERCEL_CLIENT_SECRET}"
          wails build -platform ${{ matrix.platform }} -clean -trimpath -ldflags "${LDFLAGS}"

      - name: Build MCP server
        env:
          GOOS: darwin
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 1
        run: |
          go build -ldflags="-s -w -X main.Version=${{ env.VERSION }}" \
            -o "build/bin/${{ env.BIN_NAME }}.app/Contents/MacOS/${{ env.BIN_SLUG }}-mcp" \
            ./backend/cmd/mcp

      - name: List build output
        run: ls -la "build/bin/${{ env.BIN_NAME }}.app/Contents/MacOS/"

      - name: Install create-dmg + librsvg
        run: brew install create-dmg librsvg

      - name: Generate DMG background (hidpi tiff from SVG)
        run: bash build/darwin/dmg/create-background.sh build/bin/dmg-background.tiff

      - name: Create DMG
        run: |
          cd build/bin

          # 准备一个干净的源目录，只包含要进 DMG 的内容（即 .app）
          # 否则 wails build 产生的其它中间文件也会被 create-dmg 一并打入
          rm -rf dmg-src
          mkdir -p dmg-src
          cp -R "${{ env.BIN_NAME }}.app" dmg-src/

          OUTPUT="${{ env.RELEASE_PREFIX }}_${VERSION}_macos_${{ matrix.arch }}.dmg"
          rm -f "$OUTPUT"

          # 关键参数（坐标需与 background.svg 中的设计一致）：
          #   --window-size 600 400          ← 与 background 的尺寸一致
          #   --icon … 150 240               ← 左侧 App 图标位置（重心略偏下）
          #   --app-drop-link 450 240        ← 右侧 Applications 快捷方式位置
          #   --background dmg-background.tiff← hidpi 自定义背景
          create-dmg \
            --volname "${{ env.APP_NAME }}" \
            --background "dmg-background.tiff" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 110 \
            --text-size 13 \
            --icon "${{ env.BIN_NAME }}.app" 150 240 \
            --hide-extension "${{ env.BIN_NAME }}.app" \
            --app-drop-link 450 240 \
            --no-internet-enable \
            "$OUTPUT" \
            dmg-src/

          # 清理临时目录，避免被 upload-artifact 误传
          rm -rf dmg-src dmg-background.tiff

      - name: Create update-zip (for in-app auto-update)
        shell: bash
        run: |
          # .zip（含 .app）专门供自更新器使用，.dmg 保留给首次下载
          # 用 ditto 保留资源分叉 + 扩展属性，解压后 macOS 视为完整的 app bundle
          cd build/bin
          OUTPUT="${{ env.RELEASE_PREFIX }}_${VERSION}_macos_${{ matrix.arch }}.zip"
          rm -f "$OUTPUT"
          ditto -c -k --sequesterRsrc --keepParent \
            "${{ env.BIN_NAME }}.app" "$OUTPUT"
          ls -lh "$OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-build-${{ matrix.arch }}
          path: |
            build/bin/*.dmg
            build/bin/*.zip
          if-no-files-found: error

  # ===========================================================================
  # Windows — amd64 + arm64（便携版 exe + Inno Setup 安装包）
  # ===========================================================================
  build-windows:
    needs: prepare
    runs-on: windows-latest
    strategy:
      matrix:
        include:
          - arch: amd64
            inno_arch: x64compatible
          - arch: arm64
            inno_arch: arm64
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
      GH_OAUTH_CLIENT_ID: ${{ secrets.GH_OAUTH_CLIENT_ID }}
      GH_OAUTH_CLIENT_SECRET: ${{ secrets.GH_OAUTH_CLIENT_SECRET }}
      GITEE_CLIENT_ID: ${{ secrets.GITEE_CLIENT_ID }}
      GITEE_CLIENT_SECRET: ${{ secrets.GITEE_CLIENT_SECRET }}
      NETLIFY_CLIENT_ID: ${{ secrets.NETLIFY_CLIENT_ID }}
      NETLIFY_CLIENT_SECRET: ${{ secrets.NETLIFY_CLIENT_SECRET }}
      VERCEL_CLIENT_ID: ${{ secrets.VERCEL_CLIENT_ID }}
      VERCEL_CLIENT_SECRET: ${{ secrets.VERCEL_CLIENT_SECRET }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Patch wails.json productVersion
        shell: bash
        run: |
          VER="${VERSION#v}"
          node -e "
            const fs = require('fs');
            const j = JSON.parse(fs.readFileSync('wails.json', 'utf8'));
            j.info.productVersion = '$VER';
            fs.writeFileSync('wails.json', JSON.stringify(j, null, 4) + '\n');
            console.log('✔ wails.json productVersion → $VER');
          "

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup -y
          $langDir = "C:\Program Files (x86)\Inno Setup 6\Languages"
          $langUrl = "https://raw.githubusercontent.com/jrsoftware/issrc/main/Files/Languages/Unofficial/ChineseSimplified.isl"
          Invoke-WebRequest -Uri $langUrl -OutFile "$langDir\ChineseSimplified.isl"

      - name: Build Windows ${{ matrix.arch }}
        shell: bash
        run: |
          LDFLAGS="-X main.Version=${VERSION}"
          LDFLAGS="${LDFLAGS} -X gridea-pro/backend/internal/service/oauth.githubClientID=${GH_OAUTH_CLIENT_ID}"
          LDFLAGS="${LDFLAGS} -X gridea-pro/backend/internal/service/oauth.githubClientSecret=${GH_OAUTH_CLIENT_SECRET}"
          LDFLAGS="${LDFLAGS} -X gridea-pro/backend/internal/service/oauth.giteeClientID=${GITEE_CLIENT_ID}"
          LDFLAGS="${LDFLAGS} -X gridea-pro/backend/internal/service/oauth.giteeClientSecret=${GITEE_CLIENT_SECRET}"
          LDFLAGS="${LDFLAGS} -X gridea-pro/backend/internal/service/oauth.netlifyClientID=${NETLIFY_CLIENT_ID}"
          LDFLAGS="${LDFLAGS} -X gridea-pro/backend/internal/service/oauth.netlifyClientSecret=${NETLIFY_CLIENT_SECRET}"
          LDFLAGS="${LDFLAGS} -X gridea-pro/backend/internal/service/oauth.vercelClientID=${VERCEL_CLIENT_ID}"
          LDFLAGS="${LDFLAGS} -X gridea-pro/backend/internal/service/oauth.vercelClientSecret=${VERCEL_CLIENT_SECRET}"
          wails build -platform windows/${{ matrix.arch }} -clean -trimpath -ldflags "${LDFLAGS}"

      - name: Build MCP server
        env:
          GOOS: windows
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 0
        run: |
          go build -ldflags="-s -w -X main.Version=${{ env.VERSION }}" -o "build/bin/${{ env.BIN_SLUG }}-mcp.exe" ./backend/cmd/mcp

      - name: List build output
        shell: bash
        run: ls -la build/bin/

      - name: Create Inno Setup installer
        shell: pwsh
        run: |
          $version = "${{ env.VERSION }}".TrimStart("v")
          $arch = "${{ matrix.arch }}"
          $innoArch = "${{ matrix.inno_arch }}"
          $outputName = "${{ env.RELEASE_PREFIX }}_${{ env.VERSION }}_windows_${arch}_setup"

          # 生成 .iss 脚本
          $iss = @"
          [Setup]
          AppName=${{ env.APP_NAME }}
          AppVersion=${version}
          AppPublisher=Gridea Pro Contributors
          AppPublisherURL=https://gridea.pro
          AppSupportURL=https://github.com/Gridea-Pro/gridea-pro/issues
          DefaultDirName={autopf}\${{ env.APP_NAME }}
          DefaultGroupName=${{ env.APP_NAME }}
          OutputDir=build\bin
          OutputBaseFilename=${outputName}
          Compression=lzma2
          SolidCompression=yes
          ArchitecturesAllowed=${innoArch}
          ArchitecturesInstallIn64BitMode=${innoArch}
          UninstallDisplayIcon={app}\${{ env.BIN_NAME }}.exe
          SetupIconFile=build\appicon.ico
          WizardStyle=modern
          PrivilegesRequired=lowest
          PrivilegesRequiredOverridesAllowed=dialog
          ShowLanguageDialog=no
          DisableDirPage=no

          [Languages]
          Name: "chinesesimplified"; MessagesFile: "compiler:Languages\ChineseSimplified.isl"
          Name: "english"; MessagesFile: "compiler:Default.isl"

          [Files]
          Source: "build\bin\${{ env.BIN_NAME }}.exe"; DestDir: "{app}"; Flags: ignoreversion
          Source: "build\bin\${{ env.BIN_SLUG }}-mcp.exe"; DestDir: "{app}"; Flags: ignoreversion

          [Icons]
          Name: "{group}\${{ env.APP_NAME }}"; Filename: "{app}\${{ env.BIN_NAME }}.exe"
          Name: "{autodesktop}\${{ env.APP_NAME }}"; Filename: "{app}\${{ env.BIN_NAME }}.exe"; Tasks: desktopicon

          [Tasks]
          Name: "desktopicon"; Description: "{cm:CreateDesktopIcon}"; GroupDescription: "{cm:AdditionalIcons}"

          [Run]
          Filename: "{app}\${{ env.BIN_NAME }}.exe"; Description: "{cm:LaunchProgram,${{ env.APP_NAME }}}"; Flags: nowait postinstall skipifsilent

          [Code]
          procedure InitializeWizard();
          begin
            WizardForm.BringToFront;
          end;
          "@

          $iss | Out-File -FilePath "installer.iss" -Encoding UTF8

          # 如果没有 .ico 文件，从 .png 生成一个（Inno Setup 需要 .ico）
          if (-Not (Test-Path "build\appicon.ico")) {
            # 使用 magick 转换（GitHub runner 预装了 ImageMagick）
            magick "build\appicon.png" -define icon:auto-resize=256,128,64,48,32,16 "build\appicon.ico"
          }

          # 编译安装包
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "installer.iss"

      - name: Package portable exe (for in-app auto-update)
        shell: pwsh
        run: |
          # 便携 .exe 专供自更新器使用（selfupdate 直接原地替换当前可执行）
          # Inno Setup 安装器给首次下载用户
          $portable = "build\bin\${{ env.RELEASE_PREFIX }}_${{ env.VERSION }}_windows_${{ matrix.arch }}_portable.exe"
          Copy-Item "build\bin\${{ env.BIN_NAME }}.exe" $portable -Force
          Get-ChildItem build\bin\*.exe | Select-Object Name, Length

      - uses: actions/upload-artifact@v4
        with:
          name: windows-build-${{ matrix.arch }}
          path: |
            build/bin/${{ env.RELEASE_PREFIX }}_*_setup.exe
            build/bin/${{ env.RELEASE_PREFIX }}_*_portable.exe
          if-no-files-found: error

  # ===========================================================================
  # Linux — .deb + .rpm + .AppImage (amd64)
  # ===========================================================================
  build-linux:
    needs: prepare
    runs-on: ubuntu-24.04
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
      GH_OAUTH_CLIENT_ID: ${{ secrets.GH_OAUTH_CLIENT_ID }}
      GH_OAUTH_CLIENT_SECRET: ${{ secrets.GH_OAUTH_CLIENT_SECRET }}
      GITEE_CLIENT_ID: ${{ secrets.GITEE_CLIENT_ID }}
      GITEE_CLIENT_SECRET: ${{ secrets.GITEE_CLIENT_SECRET }}
      NETLIFY_CLIENT_ID: ${{ secrets.NETLIFY_CLIENT_ID }}
      NETLIFY_CLIENT_SECRET: ${{ secrets.NETLIFY_CLIENT_SECRET }}
      VERCEL_CLIENT_ID: ${{ secrets.VERCEL_CLIENT_ID }}
      VERCEL_CLIENT_SECRET: ${{ secrets.VERCEL_CLIENT_SECRET }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            build-essential \
            pkg-config \
            libfuse2 \
            rpm

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Patch wails.json productVersion
        shell: bash
        run: |
          VER="${VERSION#v}"
          node -e "
            const fs = require('fs');
            const j = JSON.parse(fs.readFileSync('wails.json', 'utf8'));
            j.info.productVersion = '$VER';
            fs.writeFileSync('wails.json', JSON.stringify(j, null, 4) + '\n');
            console.log('✔ wails.json productVersion → $VER');
          "

      - name: Install nfpm
        run: go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest

      - name: Build Linux binary
        shell: bash
        run: |
          LDFLAGS="-X main.Version=${VERSION}"
          LDFLAGS="${LDFLAGS} -X gridea-pro/backend/internal/service/oauth.githubClientID=${GH_OAUTH_CLIENT_ID}"
          LDFLAGS="${LDFLAGS} -X gridea-pro/backend/internal/service/oauth.githubClientSecret=${GH_OAUTH_CLIENT_SECRET}"
          LDFLAGS="${LDFLAGS} -X gridea-pro/backend/internal/service/oauth.giteeClientID=${GITEE_CLIENT_ID}"
          LDFLAGS="${LDFLAGS} -X gridea-pro/backend/internal/service/oauth.giteeClientSecret=${GITEE_CLIENT_SECRET}"
          LDFLAGS="${LDFLAGS} -X gridea-pro/backend/internal/service/oauth.netlifyClientID=${NETLIFY_CLIENT_ID}"
          LDFLAGS="${LDFLAGS} -X gridea-pro/backend/internal/service/oauth.netlifyClientSecret=${NETLIFY_CLIENT_SECRET}"
          LDFLAGS="${LDFLAGS} -X gridea-pro/backend/internal/service/oauth.vercelClientID=${VERCEL_CLIENT_ID}"
          LDFLAGS="${LDFLAGS} -X gridea-pro/backend/internal/service/oauth.vercelClientSecret=${VERCEL_CLIENT_SECRET}"
          wails build -platform linux/amd64 -clean -trimpath -tags webkit2_41 -ldflags "${LDFLAGS}"

      - name: Build MCP server
        env:
          CGO_ENABLED: 0
        run: |
          go build -ldflags="-s -w -X main.Version=${{ env.VERSION }}" \
            -o "build/bin/${{ env.BIN_SLUG }}-mcp" \
            ./backend/cmd/mcp

      - name: List build output
        run: ls -la build/bin/

      # ----- .deb + .rpm（使用 nfpm 统一构建）-----
      - name: Prepare packaging files
        run: |
          SLUG="${{ env.BIN_SLUG }}"
          DEB_VERSION="${VERSION#v}"

          # .desktop 文件
          cat > ${SLUG}.desktop << EOF
          [Desktop Entry]
          Name=${{ env.APP_NAME }}
          Comment=A modern static blog client
          Exec=${SLUG}
          Icon=${SLUG}
          Type=Application
          Categories=Development;TextEditor;
          Keywords=blog;markdown;static;
          EOF

          # nfpm 配置（同时用于 .deb 和 .rpm）
          cat > nfpm.yaml << NFPM
          name: "${SLUG}"
          arch: "amd64"
          platform: "linux"
          version: "${DEB_VERSION}"
          maintainer: "Gridea Pro Contributors <hello@gridea.pro>"
          description: "A cross-platform desktop static blog client with built-in editor, theme system, and one-click deployment."
          homepage: "https://gridea.pro"
          license: "GPL-3.0"
          depends:
            - libwebkit2gtk-4.1-0
            - libgtk-3-0
          overrides:
            rpm:
              depends:
                - webkit2gtk4.1
                - gtk3
          contents:
            - src: "build/bin/${{ env.BIN_NAME }}"
              dst: "/usr/bin/${SLUG}"
              file_info:
                mode: 0755
            - src: "build/bin/${SLUG}-mcp"
              dst: "/usr/bin/${SLUG}-mcp"
              file_info:
                mode: 0755
            - src: "build/appicon.png"
              dst: "/usr/share/icons/hicolor/256x256/apps/${SLUG}.png"
            - src: "${SLUG}.desktop"
              dst: "/usr/share/applications/${SLUG}.desktop"
          NFPM

      - name: Build .deb package
        run: |
          nfpm pkg -p deb -f nfpm.yaml \
            -t "build/bin/${{ env.RELEASE_PREFIX }}_${VERSION}_linux_amd64.deb"

      - name: Build .rpm package
        run: |
          nfpm pkg -p rpm -f nfpm.yaml \
            -t "build/bin/${{ env.RELEASE_PREFIX }}_${VERSION}_linux_amd64.rpm"

      # ----- AppImage -----
      - name: Build AppImage
        run: |
          SLUG="${{ env.BIN_SLUG }}"

          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps

          cp "build/bin/${{ env.BIN_NAME }}" "AppDir/usr/bin/${SLUG}"
          chmod 755 "AppDir/usr/bin/${SLUG}"
          cp "build/bin/${SLUG}-mcp" "AppDir/usr/bin/${SLUG}-mcp"
          chmod 755 "AppDir/usr/bin/${SLUG}-mcp"
          cp build/appicon.png "AppDir/${SLUG}.png"
          cp build/appicon.png "AppDir/usr/share/icons/hicolor/256x256/apps/${SLUG}.png"
          cp "${{ env.BIN_SLUG }}.desktop" "AppDir/${SLUG}.desktop"
          cp "${{ env.BIN_SLUG }}.desktop" AppDir/usr/share/applications/

          cat > AppDir/AppRun << EOF
          #!/bin/bash
          SELF=\$(readlink -f "\$0")
          HERE=\${SELF%/*}
          export PATH="\${HERE}/usr/bin:\${PATH}"
          export APPIMAGE_EXTRACT_AND_RUN=1
          exec "\${HERE}/usr/bin/${SLUG}" "\$@"
          EOF
          chmod +x AppDir/AppRun

          wget -q "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x appimagetool-x86_64.AppImage

          ARCH=x86_64 ./appimagetool-x86_64.AppImage AppDir \
            "build/bin/${{ env.RELEASE_PREFIX }}_${VERSION}_linux_amd64.AppImage"

      - uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: |
            build/bin/*.deb
            build/bin/*.rpm
            build/bin/*.AppImage
          if-no-files-found: error

  # ===========================================================================
  # 创建 GitHub Release — 仅 tag 触发时执行
  # ===========================================================================
  create-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [prepare, build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: List release files
        run: |
          echo "=== Release artifacts ==="
          ls -lh artifacts/
          echo "========================="

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Gridea Pro ${{ needs.prepare.outputs.version }}
          files: artifacts/*
          generate_release_notes: true
          draft: true
          prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'alpha') || contains(github.ref, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
