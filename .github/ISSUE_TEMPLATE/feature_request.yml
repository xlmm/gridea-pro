name: "\U0001F4A1 功能建议"
description: 为 Gridea Pro 提出新功能或改进建议
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        我们非常期待听到你的想法！请描述你希望在 Gridea Pro 中看到的功能。

  - type: dropdown
    id: category
    attributes:
      label: 类别
      description: 这个功能属于哪个方面？
      options:
        - 编辑器 / 写作体验
        - 主题 / 外观
        - 发布 / 部署
        - 媒体管理
        - 设置 / 配置
        - 性能优化
        - 平台支持
        - 其他
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: 问题或动机
      description: "这个功能解决什么问题？是否和你遇到的某个痛点有关？"
      placeholder: "我在使用时经常遇到……"
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 期望的方案
      description: 描述你期望的功能或解决方案。
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 考虑过的替代方案
      description: 你是否考虑过其他解决方案或临时方法？
    validations:
      required: false

  - type: textarea
    id: references
    attributes:
      label: 参考资料
      description: "其他工具中类似功能的链接、设计稿、截图或任何相关资料。"
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: 检查清单
      options:
        - label: 我已搜索过现有 Issue 和 Discussions，确认此功能尚未被提出过。
          required: true
