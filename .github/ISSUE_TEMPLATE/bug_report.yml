name: "\U0001F41B Bug 报告"
description: 报告 Gridea Pro 的 Bug 或异常行为
title: "[Bug] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你花时间提交 Bug 报告！请尽可能详细地填写以下信息，这将帮助我们更快定位和修复问题。

  - type: input
    id: version
    attributes:
      label: Gridea Pro 版本
      description: "可以在设置或关于对话框中找到版本号。"
      placeholder: "例如 v1.0.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: 操作系统
      options:
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Windows 10/11 (x64)
        - Windows (ARM)
        - Linux (Ubuntu/Debian)
        - Linux (Fedora/RHEL)
        - Linux (其他)
    validations:
      required: true

  - type: input
    id: os-version
    attributes:
      label: 系统版本
      placeholder: "例如 macOS 15.1、Windows 11 23H2、Ubuntu 24.04"
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: Bug 描述
      description: 简明扼要地描述这个 Bug 是什么。
      placeholder: "描述发生了什么……"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      description: 我们如何复现这个问题？
      placeholder: |
        1. 进入 '...'
        2. 点击 '...'
        3. 向下滚动到 '...'
        4. 看到错误
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望行为
      description: 你期望发生什么？
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 实际行为
      description: 实际发生了什么？
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: 截图 / 日志
      description: "如果可以，请添加截图或粘贴错误日志。可以直接拖拽图片到这里。"
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: 补充信息
      description: "其他相关信息——使用的主题、博客托管平台（GitHub Pages、Vercel 等）、文章数量等。"
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: 检查清单
      options:
        - label: 我已搜索过现有 Issue，确认此 Bug 尚未被报告过。
          required: true
        - label: 我正在使用最新版本的 Gridea Pro。
          required: false
