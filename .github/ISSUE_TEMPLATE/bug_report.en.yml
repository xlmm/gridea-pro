name: "\U0001F41B Bug Report"
description: Report a bug or unexpected behavior in Gridea Pro
title: "[Bug] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill in as much detail as possible so we can reproduce and fix it.

  - type: input
    id: version
    attributes:
      label: Gridea Pro Version
      description: "You can find this in Settings or the About dialog."
      placeholder: "e.g. v1.0.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Windows 10/11 (x64)
        - Windows (ARM)
        - Linux (Ubuntu/Debian)
        - Linux (Fedora/RHEL)
        - Linux (Other)
    validations:
      required: true

  - type: input
    id: os-version
    attributes:
      label: OS Version
      placeholder: "e.g. macOS 15.1, Windows 11 23H2, Ubuntu 24.04"
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: "Describe what happened..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / Logs
      description: "If applicable, add screenshots or paste error logs. You can drag and drop images here."
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: "Any other context — theme in use, blog hosting platform (GitHub Pages, Vercel, etc.), number of posts, etc."
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues to make sure this bug has not already been reported.
          required: true
        - label: I am using the latest version of Gridea Pro.
          required: false
