name: "\U0001F4A1 Feature Request"
description: Suggest a new feature or improvement for Gridea Pro
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        We'd love to hear your ideas! Please describe the feature you'd like to see in Gridea Pro.

  - type: dropdown
    id: category
    attributes:
      label: Category
      description: What area does this feature relate to?
      options:
        - Editor / Writing Experience
        - Theme / Appearance
        - Publishing / Deployment
        - Media Management
        - Settings / Configuration
        - Performance
        - Platform Support
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem or Motivation
      description: "What problem does this feature solve? Is this related to a frustration you're experiencing?"
      placeholder: "I'm always frustrated when..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution or feature you'd like.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any alternative solutions or workarounds?
    validations:
      required: false

  - type: textarea
    id: references
    attributes:
      label: References
      description: "Links to similar features in other tools, mockups, screenshots, or any other context."
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues and discussions to make sure this feature has not already been requested.
          required: true
